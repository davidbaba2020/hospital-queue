<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>404 Not Found — MediQueue</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f4f7fb;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
    .card{background:#fff;border-radius:20px;padding:60px 48px;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
    .code{font-family:'Syne',sans-serif;font-size:96px;font-weight:800;color:#1a5676;line-height:1}
    .title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:#1a3a52;margin:12px 0 8px}
    .msg{color:#6b7280;font-size:15px;line-height:1.7;margin-bottom:28px}
    .msg code{background:#f3f4f6;padding:2px 8px;border-radius:4px;font-size:13px}
    .btns{display:flex;gap:12px;justify-content:center}
    .btn{display:inline-flex;padding:10px 24px;border-radius:10px;background:#1a5676;color:#fff;font-weight:600;text-decoration:none;font-size:14px}
    .btn-ghost{background:#f3f4f6;color:#374151}
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1 class="title">Page Not Found</h1>
    <p class="msg" th:if="${message}" th:text="${message}">The resource you requested was not found.</p>
    <p class="msg" th:unless="${message}">The page you're looking for doesn't exist or has been moved.</p>
    <div class="btns">
      <a href="javascript:history.back()" class="btn btn-ghost">← Go Back</a>
      <a href="/auth/login" class="btn">Home</a>
    </div>
  </div>
</body>
</html>
