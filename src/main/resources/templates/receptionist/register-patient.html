<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" th:href="@{/css/app.css}"/></head>
<body>
<th:block th:replace="~{fragments/layout :: sidebar}"></th:block>
<div class="main-wrap">
  <th:block th:replace="~{fragments/layout :: topbar}"></th:block>
  <main class="content-area">

    <div th:if="${successMsg}" class="alert alert--success">
      <i data-lucide="check-circle-2"></i><span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="alert alert--error">
      <i data-lucide="alert-circle"></i><span th:text="${errorMsg}"></span>
    </div>

    <div class="two-col">

      <!-- Step 1: Patient search/register -->
      <div class="panel">
        <div class="panel__header">
          <h3><i data-lucide="user-plus"></i> Patient Registration</h3>
        </div>

        <!-- Search existing -->
        <div class="form-section">
          <label class="form-label">Search Existing Patient</label>
          <div class="input-wrap">
            <i data-lucide="search" class="input-icon"></i>
            <input type="text" id="patient-search" class="form-input"
                   placeholder="Name, phone, or patient number…"
                   oninput="searchPatients(this.value)"/>
          </div>
          <div id="search-results" class="search-dropdown"></div>
        </div>

        <div class="divider-or"><span>or register new</span></div>

        <form th:action="@{/receptionist/patients}" method="post"
              th:object="${patientRequest}" class="reg-form" novalidate>
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name *</label>
              <input type="text" th:field="*{fullName}" class="form-input" placeholder="John Doe"/>
              <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="form-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Phone *</label>
              <input type="tel" th:field="*{phone}" class="form-input" placeholder="+234-801-0000"/>
              <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="form-error"></div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" th:field="*{email}" class="form-input" placeholder="patient@email.com"/>
            </div>
            <div class="form-group">
              <label class="form-label">Date of Birth</label>
              <input type="date" th:field="*{dateOfBirth}" class="form-input"/>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Gender</label>
              <select th:field="*{gender}" class="form-select">
                <option value="">Select…</option>
                <option value="MALE">Male</option>
                <option value="FEMALE">Female</option>
                <option value="OTHER">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Blood Type</label>
              <select th:field="*{bloodType}" class="form-select">
                <option value="">Unknown</option>
                <option th:each="bt : ${'A+,A-,B+,B-,AB+,AB-,O+,O-'.split(',')}"
                        th:value="${bt}" th:text="${bt}">A+</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Address</label>
            <input type="text" th:field="*{address}" class="form-input" placeholder="123 Street, City"/>
          </div>
          <div class="form-group">
            <label class="form-label">Known Allergies</label>
            <input type="text" th:field="*{allergies}" class="form-input" placeholder="Penicillin, Peanuts…"/>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Emergency Contact Name</label>
              <input type="text" th:field="*{emergencyContactName}" class="form-input"/>
            </div>
            <div class="form-group">
              <label class="form-label">Emergency Contact Phone</label>
              <input type="tel" th:field="*{emergencyContactPhone}" class="form-input"/>
            </div>
          </div>

          <button type="submit" class="btn btn--primary btn--full">
            <i data-lucide="user-check"></i> Register Patient
          </button>
        </form>
      </div>

      <!-- Step 2: Add to queue -->
      <div class="panel">
        <div class="panel__header">
          <h3><i data-lucide="list-plus"></i> Add to Queue</h3>
        </div>

        <div id="selected-patient-banner" class="selected-patient" style="display:none">
          <i data-lucide="user-check"></i>
          <div>
            <p class="sp-name" id="sp-name">Patient Name</p>
            <p class="sp-num" id="sp-num">PAT-00000</p>
          </div>
          <button onclick="clearPatient()" class="btn btn--xs btn--ghost">
            <i data-lucide="x"></i>
          </button>
        </div>

        <div class="form-group">
          <label class="form-label">Patient ID (auto-filled)</label>
          <input type="number" id="queue-patient-id" class="form-input" placeholder="Select patient above" readonly/>
        </div>
        <div class="form-group">
          <label class="form-label">Department *</label>
          <select id="queue-dept" class="form-select">
            <option value="">Choose department…</option>
            <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}">Dept</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <div class="priority-select">
            <label class="prio-option" th:each="p : ${'NORMAL,HIGH,CRITICAL'.split(',')}">
              <input type="radio" name="priority" th:value="${p}"
                     th:checked="${p == 'NORMAL'}"/>
              <span th:text="${p}" th:classappend="${'prio-badge prio-' + p.toLowerCase()}">NORMAL</span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Chief Complaint</label>
          <textarea id="queue-complaint" class="form-textarea" rows="3"
                    placeholder="Briefly describe the main reason for the visit…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Vitals</label>
          <input type="text" id="queue-vitals" class="form-input"
                 placeholder="BP: 120/80, Temp: 37.2°C, HR: 72"/>
        </div>

        <button class="btn btn--primary btn--full" onclick="addToQueue()">
          <i data-lucide="plus-circle"></i> Add to Queue
        </button>

        <!-- Ticket output -->
        <div id="ticket-output" class="ticket-card" style="display:none">
          <div class="ticket-card__header">
            <i data-lucide="ticket"></i> Queue Ticket
          </div>
          <p class="ticket-number" id="ticket-num">TKT-GEN-001</p>
          <p class="ticket-wait">Est. wait: <span id="ticket-wait">—</span> min</p>
          <p class="ticket-pos">Position: <strong id="ticket-pos">—</strong></p>
          <button class="btn btn--ghost btn--sm" onclick="window.print()">
            <i data-lucide="printer"></i> Print
          </button>
        </div>
      </div>
    </div>

  </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script>
  lucide.createIcons();
  let selectedPatientId = null;

  async function searchPatients(q) {
    if (q.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
    const res = await fetch('/receptionist/patients/search?q=' + encodeURIComponent(q));
    const data = await res.json();
    const el = document.getElementById('search-results');
    if (!data.data.length) { el.innerHTML = '<div class="sr-empty">No patients found</div>'; return; }
    el.innerHTML = data.data.map(p => `
      <div class="sr-item" onclick="selectPatient(${p.id}, '${p.fullName}', '${p.patientNumber}')">
        <span class="sr-name">${p.fullName}</span>
        <span class="sr-meta">${p.patientNumber} · ${p.phone}</span>
      </div>`).join('');
  }

  function selectPatient(id, name, num) {
    selectedPatientId = id;
    document.getElementById('queue-patient-id').value = id;
    document.getElementById('sp-name').textContent = name;
    document.getElementById('sp-num').textContent  = num;
    document.getElementById('selected-patient-banner').style.display = 'flex';
    document.getElementById('search-results').innerHTML = '';
    document.getElementById('patient-search').value = '';
  }

  function clearPatient() {
    selectedPatientId = null;
    document.getElementById('queue-patient-id').value = '';
    document.getElementById('selected-patient-banner').style.display = 'none';
  }

  async function addToQueue() {
    const patientId = document.getElementById('queue-patient-id').value;
    const deptId    = document.getElementById('queue-dept').value;
    if (!patientId) return showToast('Please select a patient first', 'error');
    if (!deptId)    return showToast('Please select a department', 'error');

    const priority  = document.querySelector('input[name="priority"]:checked')?.value || 'NORMAL';
    const complaint = document.getElementById('queue-complaint').value;
    const vitals    = document.getElementById('queue-vitals').value;

    const res = await fetch('/receptionist/queue', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-XSRF-TOKEN': getCsrfToken()},
      body: JSON.stringify({ patientId, departmentId: deptId, priority, chiefComplaint: complaint, vitals })
    });
    const data = await res.json();
    if (data.success) {
      const q = data.data;
      document.getElementById('ticket-num').textContent  = q.ticketNumber;
      document.getElementById('ticket-wait').textContent = q.estimatedWaitMin || '—';
      document.getElementById('ticket-pos').textContent  = q.positionInQueue;
      document.getElementById('ticket-output').style.display = 'block';
      showToast('Patient added to queue!', 'success');
      lucide.createIcons();
    } else {
      showToast(data.message || 'Error adding to queue', 'error');
    }
  }
</script>
</body>
</html>
