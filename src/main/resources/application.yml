spring:
  application:
    name: hospital-queue
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:hospitaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: localhost
    port: 1025
    username: ''
    password: ''
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  jwt:
    secret: dev-secret-key-hospital-queue-management-system-2024-very-long-and-secure
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
    cookie-name: HQ_TOKEN
  queue:
    max-size: 50
    alert-threshold: 40
  mail:
    from: noreply@hospitalqueue.com
    from-name: Hospital Queue System

server:
  port: 8080
  error:
    whitelabel:
      enabled: false

logging:
  level:
    com.hospital.queue: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    cookie-name: HQ_TOKEN
  queue:
    max-size: ${QUEUE_MAX_SIZE:50}
    alert-threshold: ${QUEUE_ALERT_THRESHOLD:40}
  mail:
    from: ${MAIL_FROM:noreply@hospitalqueue.com}
    from-name: Hospital Queue System

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json
  error:
    whitelabel:
      enabled: false

logging:
  level:
    com.hospital.queue: INFO
    org.springframework.security: WARN
